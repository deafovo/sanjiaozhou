<!DOCTYPE html>

        }

            background: rgba(255, 255, 255, 0.03);

        let state = { currentPage: 'welcome', currentQuestion: 0, answers: [], totalScore: 0 };

        function startQuiz() {
            state.currentPage = 'quiz';
            state.currentQuestion = 0;
            state.answers = [];
            document.getElementById('welcomePage').classList.add('hidden');
            document.getElementById('quizPage').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[state.currentQuestion];
            document.getElementById('categoryLabel').textContent = q.category;
            document.getElementById('questionNumber').textContent = `${q.id.toString().padStart(2, '0')} / 32`;
            document.getElementById('progressBar').style.width = `${(q.id / 32) * 100}%`;
            
            const container = document.getElementById('questionContainer');
            const existingAnswer = state.answers.find(a => a.questionId === q.id);
            
            container.innerHTML = `
                <h2 class="text-xl md:text-2xl font-medium text-gray-100 mb-10 leading-relaxed">
                    ${q.question}
                </h2>
                <div class="space-y-3">
                    ${q.options.map((opt, idx) => `
                        <button onclick="selectOption(${idx})" 
                                class="option-btn w-full text-left p-5 rounded-xl border border-white/10 ${existingAnswer && existingAnswer.score === opt.score ? 'selected border-transparent text-white' : 'text-gray-300'} transition-all" 
                                id="option-${idx}">
                            <span class="inline-block w-9 h-9 rounded-full ${existingAnswer && existingAnswer.score === opt.score ? 'bg-white/20' : 'bg-white/5'} text-center leading-9 font-medium mr-4 text-sm">${String.fromCharCode(65 + idx)}</span>
                            <span class="text-base">${opt.text}</span>
                        </button>
                    `).join('')}
                </div>
            `;
            
            document.getElementById('prevBtn').disabled = state.currentQuestion === 0;
        }

        function selectOption(idx) {
            const q = questions[state.currentQuestion];
            state.answers = state.answers.filter(a => a.questionId !== q.id);
            state.answers.push({ questionId: q.id, score: q.options[idx].score });
            renderQuestion();
            setTimeout(() => {
                nextQuestion();
            }, 500);
        }

        function prevQuestion() {
            if (state.currentQuestion > 0) {
                state.currentQuestion--;
                renderQuestion();
            }
        }

        function nextQuestion() {
            const existingAnswer = state.answers.find(a => a.questionId === questions[state.currentQuestion].id);
            if (!existingAnswer) return;
            
            if (state.currentQuestion < 31) {
                state.currentQuestion++;
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            state.totalScore = state.answers.reduce((sum, a) => sum + a.score, 0);
            const result = resultTypes.find(r => state.totalScore >= r.min && state.totalScore <= r.max);
            
            state.currentPage = 'result';
            document.getElementById('quizPage').classList.add('hidden');
            document.getElementById('resultPage').classList.remove('hidden');
            
            document.getElementById('resultContainer').innerHTML = `
                <div class="card-bg rounded-3xl overflow-hidden">
                    <div class="bg-gradient-to-br from-green-900/50 to-amber-900/30 p-8 md:p-12 text-center border-b border-white/10">

                        <p class="text-xs uppercase tracking-widest text-gray-400 mb-3">Your Matched Operator</p>
                        <div class="operator-emblem mb-4">${result.emblem}</div>
                        <h1 class="font-display text-3xl md:text-4xl font-semibold mb-2">${result.type}</h1>
                        <h2 class="text-xl text-gray-300 mb-2">${result.typeCN}</h2>
                        <div class="inline-block px-4 py-1 rounded-full bg-amber-500/20 border border-amber-500/30 text-amber-400 text-sm font-medium mb-4">${result.role}兵种</div>
                        <p class="text-sm text-gray-400">真实姓名：${result.realName}</p>
                        <div class="text-5xl font-light mt-4 mb-2">${state.totalScore}</div>
                        <p class="text-sm text-gray-400">Total Score（32 - 128）</p>
                    </div>
                    
                    <div class="p-8 md:p-10">
                        <div class="mb-10">
                            <h3 class="text-xs uppercase tracking-widest text-gray-400 mb-4">Personality Analysis（性格分析）</h3>
                            <p class="text-gray-300 leading-relaxed text-base">${result.description}</p>
                        </div>

                        <div class="mb-10">
                            <h3 class="text-xs uppercase tracking-widest text-gray-400 mb-4">Operator Profile（干员档案）</h3>
                            <div class="bg-white/5 rounded-xl p-6 border border-white/5">
                                <p class="text-gray-300 leading-relaxed text-sm">${result.operatorInfo}</p>
                            </div>
                        </div>
                        
                        <div class="mb-10">
                            <h3 class="text-xs uppercase tracking-widest text-gray-400 mb-4">Best Teammates（最佳搭档）</h3>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                ${result.suitablePartners.map(p => `
                                    <div class="result-type-card bg-green-500/10 border border-green-500/20 rounded-xl p-5 text-center">
                                        <div class="text-sm font-medium text-green-300">${p}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <div class="mb-10">
                            <h3 class="text-xs uppercase tracking-widest text-gray-400 mb-4">Caution with（需要谨慎配合）</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                ${result.unsuitablePartners.map(p => `
                                    <div class="result-type-card bg-red-500/10 border border-red-500/20 rounded-xl p-5 text-center">
                                        <div class="text-sm font-medium text-red-300">${p}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <div class="mb-10">
                            <h3 class="text-xs uppercase tracking-widest text-gray-400 mb-4">Tactical Advice（战术建议）</h3>
                            <ul class="space-y-4">
                                ${result.advice.map((a, idx) => `
                                    <li class="flex items-start">
                                        <span class="text-gray-500 mr-4 mt-0.5 font-medium">${(idx + 1).toString().padStart(2, '0')}</span>
                                        <span class="text-gray-300 text-base leading-relaxed">${a}</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                        
                        <div class="text-center pt-4">
                            <button onclick="restartQuiz()" class="btn-primary text-white font-medium py-4 px-12 rounded-full text-sm tracking-wide">
                                Retake Test（重新测试）
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function restartQuiz() {
            state.currentPage = 'welcome';
            state.currentQuestion = 0;
            state.answers = [];
            state.totalScore = 0;
            document.getElementById('resultPage').classList.add('hidden');
            document.getElementById('welcomePage').classList.remove('hidden');
        }
    </script>
